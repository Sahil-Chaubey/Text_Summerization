<!DOCTYPE html>
<html>
<head>
    <title>Text Summarizer</title>
</head>
<body>

    <h1>Text Summarizer</h1>

    <form method="POST">
        <textarea name="text" rows="10" cols="50" placeholder="Paste your text here..."></textarea>
        <br><br>
        <button type="submit">Summarize</button>
    </form>

    <h3>Summary:</h3>
    <p>{{ summary }}</p>

</body>
</html>
